name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - 'docs/legal/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create app .env from secret
        working-directory: app
        run: echo "${{ secrets.APP_DOTENV_B64 }}" | base64 -d > .env

      - name: Build Flutter web (current app)
        working-directory: app
        run: |
          flutter pub get
          flutter build web --release --base-href=/gym-companion/ --no-wasm-dry-run

      - name: Assemble site (Flutter app + legal pages)
        run: |
          rm -rf _site
          mkdir -p _site/legal
          cp -r app/build/web/* _site/
          cp docs/legal/*.html _site/legal/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4

appId: com.gymcompanion.gym_companion
---
# Dairy allergy (test account) + yogurt barcode → warning sheet, not hard block
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "fill-test-account"
    direction: DOWN
- tapOn:
    id: "fill-test-account"
- tapOn:
    id: "login-submit"
- extendedWaitUntil:
    visible:
      id: "home-greeting"
    timeout: 20000
- tapOn:
    id: "tab-workout"
- extendedWaitUntil:
    visible:
      id: "barcode-input"
    timeout: 10000
- tapOn:
    id: "barcode-input"
- inputText: "5000112588103"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "barcode-scan-btn"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "barcode-scan-btn"
- extendedWaitUntil:
    visible:
      id: "barcode-allergy-warning"
    timeout: 10000
- assertVisible:
    id: "barcode-log-anyway"
- tapOn:
    id: "barcode-log-anyway"
- tapOn:
    id: "barcode-confirm-log"
- back

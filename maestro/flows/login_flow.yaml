appId: com.gymcompanion.gym_companion
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "fill-test-account"
    direction: DOWN
- tapOn:
    id: "fill-test-account"
- tapOn:
    id: "login-submit"
- extendedWaitUntil:
    visible:
      id: "home-greeting"
    timeout: 15000
- tapOn:
    id: "tab-chat"
- extendedWaitUntil:
    visible: "AI Coach"
    timeout: 10000
- assertVisible:
    id: "chat-input"

appId: com.gymcompanion.gym_companion
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "fill-test-account"
    direction: DOWN
- tapOn:
    id: "fill-test-account"
- tapOn:
    id: "login-submit"
- extendedWaitUntil:
    visible:
      id: "home-greeting"
    timeout: 20000
- tapOn:
    id: "tab-chat"
- tapOn:
    id: "chat-input"
- inputText: "generate a cheap meal plan for the week"
- hideKeyboard
- tapOn:
    id: "chat-send"
- scrollUntilVisible:
    element:
      id: "chat-last-reply"
    direction: DOWN
    timeout: 60000
    visibilityPercentage: 50
    centerElement: true
- assertVisible:
    id: "chat-last-reply"
- tapOn:
    id: "tab-meals"
- extendedWaitUntil:
    visible:
      id: "food-plan-toggle"
    timeout: 10000
- extendedWaitUntil:
    visible:
      id: "meal-swap-btn"
    timeout: 10000
- assertVisible:
    id: "meal-swap-btn"

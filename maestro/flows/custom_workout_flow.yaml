appId: com.gymcompanion.gym_companion
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "fill-test-account"
    direction: DOWN
- tapOn:
    id: "fill-test-account"
- tapOn:
    id: "login-submit"
- extendedWaitUntil:
    visible:
      id: "home-greeting"
    timeout: 15000
- tapOn:
    id: "tab-workout"
- scrollUntilVisible:
    element:
      id: "workout-custom-routines"
    direction: DOWN
    timeout: 10000
- tapOn:
    id: "workout-custom-routines"
- tapOn:
    id: "custom-workout-create"
- tapOn:
    id: "custom-workout-name"
- inputText: "E2E Push"
- tapOn:
    id: "custom-workout-save"
- assertVisible:
    id: "custom-workout-item"

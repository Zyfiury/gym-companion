appId: com.gymcompanion.gym_companion
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "fill-test-account"
    direction: DOWN
- tapOn:
    id: "fill-test-account"
- tapOn:
    id: "login-submit"
- extendedWaitUntil:
    visible:
      id: "home-greeting"
    timeout: 15000
- tapOn:
    id: "tab-chat"
- tapOn:
    id: "chat-input"
- inputText: "swap my lunch"
- hideKeyboard
- tapOn:
    id: "chat-send"
- extendedWaitUntil:
    visible:
      id: "chat-last-reply"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "chat-last-reply"
    direction: DOWN
    timeout: 10000
- assertVisible:
    id: "chat-last-reply"

appId: com.gymcompanion.gym_companion
---
# Release smoke — login, core tabs, coach, food logging entry points.
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "fill-test-account"
    direction: DOWN
- tapOn:
    id: "fill-test-account"
- tapOn:
    id: "login-submit"
- extendedWaitUntil:
    visible:
      id: "home-greeting"
    timeout: 20000
- assertVisible:
    id: "home-greeting"
- tapOn:
    id: "tab-workout"
- extendedWaitUntil:
    visible:
      id: "workout-today-card"
    timeout: 8000
- tapOn:
    id: "tab-meals"
- extendedWaitUntil:
    visible: "Food"
    timeout: 8000
- tapOn:
    id: "tab-progress"
- extendedWaitUntil:
    visible: "Progress"
    timeout: 8000
- tapOn:
    id: "tab-feed"
- extendedWaitUntil:
    visible:
      id: "feed-create-btn"
    timeout: 8000
- tapOn:
    id: "tab-chat"
- assertVisible: "AI Coach"
- tapOn:
    id: "tab-home"
- assertVisible:
    id: "home-greeting"

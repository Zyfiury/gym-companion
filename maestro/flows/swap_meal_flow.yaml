appId: com.gymcompanion.gym_companion
---
# Meal variety — swap via meals tab
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "login-email"
    timeout: 20000
- scrollUntilVisible:
    element:
      id: "fill-test-account"
    direction: DOWN
- tapOn:
    id: "fill-test-account"
- tapOn:
    id: "login-submit"
- extendedWaitUntil:
    visible:
      id: "home-greeting"
    timeout: 20000
- tapOn:
    id: "tab-meals"
- scrollUntilVisible:
    element:
      id: "meal-swap-btn"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "meal-swap-btn"
- assertVisible:
    id: "meal-swap-btn"
